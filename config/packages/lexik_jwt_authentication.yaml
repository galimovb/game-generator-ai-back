lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    token_ttl: 900  # 15 минут

    token_extractors:
        authorization_header:
            enabled: false  # Отключаем заголовок
        cookie:
            enabled: true   # Включаем cookie
            name: access_token
        query_parameter:
            enabled: false

    # Автоматическая установка cookie с access token
    set_cookies:
        access_token:
            lifetime: null
            samesite: lax
            path: /
            domain: null
            secure: false
            httpOnly: true